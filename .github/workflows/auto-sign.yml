name: SvYun Auto Sign

on:
  schedule:
    # GitHub Actions 使用 UTC；这里约等于北京时间 08:15。
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  auto-sign:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Export configured secrets
        env:
          ACTION_SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const allowed = /^(TELEGRAM_BOT_TOKEN|TELEGRAM_CHAT_ID|SVYUN_(DISPLAYNAME|USERNAME|PASSWORD)_[A-Za-z0-9_]+)$/;
          const secrets = JSON.parse(process.env.ACTION_SECRETS_JSON || '{}');
          const lines = [];

          for (const [key, value] of Object.entries(secrets).sort(([left], [right]) => left.localeCompare(right))) {
            if (!allowed.test(key) || value === '') continue;
            const delimiter = `SVYUN_${key}_EOF`;
            lines.push(`${key}<<${delimiter}`);
            lines.push(String(value));
            lines.push(delimiter);
          }

          fs.appendFileSync(process.env.GITHUB_ENV, `${lines.join('\n')}\n`);
          NODE

      - name: Run SvYun auto sign
        run: pnpm start
